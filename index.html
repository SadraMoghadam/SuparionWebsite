    <title>Suparion Games</title>
    <script>
      // SPA shim — restore deep-link path stored by 404.html on Pages.
      (function () {
        var redirect = sessionStorage.getItem('redirectPath');
        if (redirect && redirect !== '/') {
          sessionStorage.removeItem('redirectPath');
          history.replaceState(null, '', redirect);
        }
      })();
    </script>
